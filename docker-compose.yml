services:
  db:
    image: postgres:16-alpine
    container_name: homeworkdrf_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${NAME:-django_drv}
      POSTGRES_USER: ${USER:-postgres}
      POSTGRES_PASSWORD: ${PASSWORD:-1234567890}
    ports:
      - "${PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    container_name: homeworkdrf_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  web:
    build: .
    container_name: homeworkdrf_web
    restart: always
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      NAME: ${NAME:-django_drv}
      USER: ${USER:-postgres}
      PASSWORD: ${PASSWORD:-1234567890}
      HOST: db
      PORT: ${PORT:-5432}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-True}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network

  celery_worker:
    build: .
    container_name: homeworkdrf_celery_worker
    restart: always
    command: celery -A config worker -l INFO
    volumes:
      - .:/app
    environment:
      NAME: ${NAME:-django_drv}
      USER: ${USER:-postgres}
      PASSWORD: ${PASSWORD:-1234567890}
      HOST: db
      PORT: ${PORT:-5432}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-True}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network

  celery_beat:
    build: .
    container_name: homeworkdrf_celery_beat
    restart: always
    command: celery -A config beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      NAME: ${NAME:-django_drv}
      USER: ${USER:-postgres}
      PASSWORD: ${PASSWORD:-1234567890}
      HOST: db
      PORT: ${PORT:-5432}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-True}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
