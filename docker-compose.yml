services:
  db:
    image: postgres:16-alpine
    container_name: homeworkdrf_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${NAME:-django_drv}
      POSTGRES_USER: ${USER:-postgres}
      POSTGRES_PASSWORD: ${PASSWORD:-1234567890}
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    container_name: homeworkdrf_redis
    restart: always
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  web:
    build: .
    container_name: homeworkdrf_web
    restart: always
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      NAME: ${NAME:-django_drv}
      USER: ${USER:-postgres}
      PASSWORD: ${PASSWORD:-1234567890}
      HOST: db
      PORT: ${PORT:-5432}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network

  celery_worker:
    build: .
    container_name: homeworkdrf_celery_worker
    restart: always
    command: celery -A config worker -l INFO
    volumes:
      - .:/app
    environment:
      NAME: ${NAME:-django_drv}
      USER: ${USER:-postgres}
      PASSWORD: ${PASSWORD:-1234567890}
      HOST: db
      PORT: ${PORT:-5432}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network

  celery_beat:
    build: .
    container_name: homeworkdrf_celery_beat
    restart: always
    command: celery -A config beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      NAME: ${NAME:-django_drv}
      USER: ${USER:-postgres}
      PASSWORD: ${PASSWORD:-1234567890}
      HOST: db
      PORT: ${PORT:-5432}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    container_name: homeworkdrf_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/static:ro
      - media_volume:/media:ro
    depends_on:
      - web
    networks:
      - app_network

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  app_network:
    driver: bridge
