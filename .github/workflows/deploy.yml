name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ========== JOB 1: ТЕСТЫ ==========
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache Poetry dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: |
          poetry install --no-interaction --no-root

      - name: Run flake8 (lint)
        run: |
          poetry run flake8 --exclude=migrations --max-line-length=88

      - name: Run black (check formatting)
        run: |
          poetry run black --check --exclude=migrations .

      - name: Run isort (check imports)
        run: |
          poetry run isort --check-only --skip=migrations .

      - name: Run mypy (type checking)
        run: |
          poetry run mypy --exclude migrations .

      - name: Run tests with coverage
        run: |
          poetry run pytest --cov=habits --cov=users --cov-report=xml --cov-fail-under=80

      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ========== JOB 2: СБОРКА (опционально) ==========
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub (опционально)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: homeworkdrf:latest

  # ========== JOB 3: ДЕПЛОЙ ==========
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Create .env file on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/homeworkdrf
            echo "${{ secrets.SERVER_ENV }}" > ~/homeworkdrf/.env
            chmod 600 ~/homeworkdrf/.env

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/homeworkdrf
            
            # Создаем docker-compose.prod.yml
            cat > docker-compose.prod.yml << 'EOF'
            version: '3.8'
            
            services:
              db:
                image: postgres:16-alpine
                container_name: homeworkdrf_db
                restart: always
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                env_file:
                  - .env
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
                  interval: 5s
                  timeout: 5s
                  retries: 5
                networks:
                  - app_network
            
              redis:
                image: redis:7-alpine
                container_name: homeworkdrf_redis
                restart: always
                volumes:
                  - redis_data:/data
                healthcheck:
                  test: ["CMD", "redis-cli", "ping"]
                  interval: 5s
                  timeout: 5s
                  retries: 5
                networks:
                  - app_network
            
              web:
                build: .
                container_name: homeworkdrf_web
                restart: always
                command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2
                volumes:
                  - static_volume:/app/staticfiles
                  - media_volume:/app/media
                ports:
                  - "8000:8000"
                env_file:
                  - .env
                depends_on:
                  db:
                    condition: service_healthy
                  redis:
                    condition: service_healthy
                networks:
                  - app_network
            
              celery_worker:
                build: .
                container_name: homeworkdrf_celery_worker
                restart: always
                command: celery -A config worker -l INFO
                volumes:
                  - .:/app
                env_file:
                  - .env
                depends_on:
                  db:
                    condition: service_healthy
                  redis:
                    condition: service_healthy
                networks:
                  - app_network
            
              celery_beat:
                build: .
                container_name: homeworkdrf_celery_beat
                restart: always
                command: celery -A config beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
                volumes:
                  - .:/app
                env_file:
                  - .env
                depends_on:
                  db:
                    condition: service_healthy
                  redis:
                    condition: service_healthy
                networks:
                  - app_network
            
            volumes:
              postgres_data:
              redis_data:
              static_volume:
              media_volume:
            
            networks:
              app_network:
                driver: bridge
            EOF
            
            # Копируем Dockerfile для production
            cat > Dockerfile.prod << 'EOF'
            FROM python:3.12-slim
            
            RUN pip install --no-cache-dir poetry
            
            WORKDIR /app
            
            COPY pyproject.toml poetry.lock ./
            RUN poetry config virtualenvs.create false \
                && poetry install --no-interaction --no-ansi --no-root
            
            COPY . .
            
            RUN python manage.py collectstatic --noinput
            
            EXPOSE 8000
            
            CMD ["gunicorn", "config.wsgi:application", "--bind", "0.0.0.0:8000"]
            EOF
            
            # Останавливаем старые контейнеры
            docker compose -f docker-compose.prod.yml down
            
            # Собираем и запускаем новые
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d
            
            # Выполняем миграции
            docker compose -f docker-compose.prod.yml exec -T web python manage.py migrate --noinput
            
            # Очищаем неиспользуемые образы
            docker system prune -f

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sleep 10
            curl -f http://localhost:8000/swagger/ || exit 1
